name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          for app in \
            /Applications/Xcode_16.4.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_16.0.app \
            /Applications/Xcode_16.app \
            /Applications/Xcode.app
          do
            if [[ -d "$app" ]]; then
              sudo xcode-select -s "$app"
              break
            fi
          done
          xcodebuild -version

      - name: Build Release
        run: |
          xcodebuild \
            -project ParevoOps.xcodeproj \
            -scheme ParevoOps \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath .build/ci-derived \
            CODE_SIGN_IDENTITY="-" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Verify app bundle
        run: test -d .build/ci-derived/Build/Products/Release/Ops.app
