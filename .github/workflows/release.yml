name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: Select Xcode 16
        run: |
          for app in \
            /Applications/Xcode_16.4.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_16.0.app \
            /Applications/Xcode_16.app \
            /Applications/Xcode.app
          do
            if [[ -d "$app" ]]; then
              sudo xcode-select -s "$app"
              break
            fi
          done
          xcodebuild -version

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Package release
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          MARKETING_VERSION: ${{ steps.ver.outputs.version }}
        run: ./scripts/package-release.sh "${{ steps.ver.outputs.version }}"

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          ZIP=".build/release/Ops-${{ steps.ver.outputs.version }}.zip"
          URL="https://github.com/${{ github.repository }}/releases/download/v${{ steps.ver.outputs.version }}/Ops-${{ steps.ver.outputs.version }}.zip"
          ./scripts/generate-appcast.sh "${{ steps.ver.outputs.version }}" "$ZIP" "$URL"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Ops ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            .build/release/Ops-${{ steps.ver.outputs.version }}.zip
            .build/release/Ops-${{ steps.ver.outputs.version }}.dmg
          body: |
            ## Ops ${{ steps.ver.outputs.version }}

            Download **Ops-${{ steps.ver.outputs.version }}.dmg** (or `.zip`), open, and drag **Ops** to Applications.

            Site: https://parevo.github.io/ops/

            > Gatekeeper: unsigned/ad-hoc builds may require right-click → Open the first time.

      # Tag deploys to github-pages env are often blocked by protection rules.
      # Commit appcast to main so the Pages workflow (on docs/**) can publish it.
      - name: Publish appcast on main
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          APPCAST_SRC="$PWD/docs/appcast.xml"
          test -f "$APPCAST_SRC"
          WORK="$(mktemp -d)"
          git clone --depth 1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$WORK/repo"
          cp "$APPCAST_SRC" "$WORK/repo/docs/appcast.xml"
          cd "$WORK/repo"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/appcast.xml; then
            echo "appcast unchanged"
            exit 0
          fi
          git add docs/appcast.xml
          git commit -m "chore: publish Sparkle appcast for v${VERSION}"
          git push origin main
